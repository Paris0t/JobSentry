<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="radar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#29b6f6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M256 96 L384 144 L384 272 C384 352 320 400 256 432 C192 400 128 352 128 272 L128 144 Z"
        fill="url(#shield)" opacity="0.2" stroke="#42a5f5" stroke-width="3"/>
  <!-- Radar sweep lines -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="url(#radar)" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#radar)" stroke-width="1.5" opacity="0.2"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#radar)" stroke-width="1" opacity="0.1"/>
  <!-- Radar sweep -->
  <path d="M256 256 L256 136" stroke="#4fc3f7" stroke-width="2" opacity="0.6"/>
  <path d="M256 256 L340 180" stroke="#4fc3f7" stroke-width="2.5" opacity="0.8"/>
  <!-- Blip dots (found jobs) -->
  <circle cx="310" cy="200" r="8" fill="#4caf50" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="260" r="6" fill="#66bb6a" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="310" r="5" fill="#81c784" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Center eye / sentry dot -->
  <circle cx="256" cy="256" r="16" fill="#4fc3f7"/>
  <circle cx="256" cy="256" r="8" fill="#e3f2fd"/>
  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="48" font-weight="700" fill="#e3f2fd" letter-spacing="4">
    JOBSENTRY
  </text>
</svg>
